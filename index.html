<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Character Exploration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .archetype-card {
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .binned-overlay {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(2px);
        }
        .favorite-placeholder {
            border: 1px dashed #374151;
            background: rgba(17, 24, 39, 0.2);
        }
    </style>
</head>
<body class="min-h-screen p-8 selection:bg-yellow-500/30">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-5xl md:text-7xl font-extrabold text-center mb-14 tracking-tighter">
            Pick your brand character
        </h1>

        <div id="favorites-section" class="mb-16 border-2 border-yellow-400 bg-gray-900 rounded-2xl p-6 shadow-2xl">
            <h2 class="text-2xl font-semibold mb-6 text-yellow-400">Favourites</h2>
            <div id="favorites-grid" class="flex flex-wrap gap-8 justify-start">
                </div>
            <p id="no-favorites-text" class="text-gray-400 italic">No favorites selected yet. Click the star on an image to move it here.</p>
        </div>

        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-12">
            </div>
    </div>

    <script>
        const githubUrls = [
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_22b24s22b24s22b2.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_48mfr48mfr48mfr4.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_7rm1my7rm1my7rm1.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_8t9fyd8t9fyd8t9f.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_bg3kosbg3kosbg3k.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_fez2jfez2jfez2jf.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_ffaz02ffaz02ffaz.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_skzqspskzqspskzq.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v2/main/Gemini_Generated_Image_775nlq775nlq775n.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v2/main/Gemini_Generated_Image_d7j2i7d7j2i7d7j2.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v2/main/Gemini_Generated_Image_g93lajg93lajg93l.png",
            "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v2/main/Gemini_Generated_Image_t6lzzut6lzzut6lz.png"
        ];

        const archetypes = [
            { name: "The Hero", desc: "Courageous, disciplined, and strong. They want to prove their worth." },
            { name: "The Creator", desc: "Imaginative and inventive. They build something of lasting value." },
            { name: "The Sage", desc: "Wise and analytical. They value truth and knowledge." },
            { name: "The Magician", desc: "Visionary and transformative. They make the impossible happen." },
            { name: "The Lover", desc: "Empathetic and aesthetic. They focus on beauty and relationships." },
            { name: "The Outlaw", desc: "Disruptive and wild. They want to break the rules." },
            { name: "The Ruler", desc: "Authoritative and stable. They provide security and excellence." },
            { name: "The Jester", desc: "Playful and irreverent. They use humor to break barriers." },
            { name: "The Everyman", desc: "Relatable and down-to-earth. They value common sense." },
            { name: "The Innocent", desc: "Optimistic and humble. They focus on simplicity." },
            { name: "The Explorer", desc: "Independent and adventurous. They crave freedom." },
            { name: "The Sage", desc: "Philosophical and wise. They value knowledge above all." }
        ];

        let state = githubUrls.map((url, i) => ({
            id: i,
            url: url,
            name: archetypes[i].name,
            desc: archetypes[i].desc,
            isFavorite: false,
            isBinned: false
        }));

        function render() {
            const mainGrid = document.getElementById('main-grid');
            const favoritesGrid = document.getElementById('favorites-grid');
            const noFavsText = document.getElementById('no-favorites-text');

            mainGrid.innerHTML = '';
            favoritesGrid.innerHTML = '';

            const favoriteItems = state.filter(img => img.isFavorite);
            noFavsText.style.display = favoriteItems.length === 0 ? 'block' : 'none';

            state.forEach(img => {
                if (img.isFavorite) {
                    // Render in Favorites section
                    const favEl = document.createElement('div');
                    favEl.className = "flex flex-col items-center w-28 sm:w-36";
                    favEl.innerHTML = `
                        <div class="relative w-full aspect-[9/10] rounded-xl overflow-hidden shadow-[0_0_25px_rgba(255,255,255,0.3)] border border-white/20">
                            <img src="${img.url}" class="object-cover object-top w-full h-full">
                            <button onclick="toggleFavorite(${img.id})" class="absolute top-2 right-2 p-1.5 bg-black/60 rounded-full text-white">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <p class="mt-3 text-[10px] font-bold text-yellow-400 uppercase tracking-widest text-center">${img.name}</p>
                    `;
                    favoritesGrid.appendChild(favEl);

                    // Render Placeholder in main grid
                    const placeholder = document.createElement('div');
                    placeholder.className = "favorite-placeholder aspect-[9/10] w-full rounded-2xl flex items-center justify-center";
                    placeholder.innerHTML = `<i data-lucide="star" class="text-gray-800 w-8 h-8"></i>`;
                    mainGrid.appendChild(placeholder);
                } else {
                    // Render regular card
                    const card = document.createElement('div');
                    card.className = "flex flex-col h-full group";
                    card.innerHTML = `
                        <div class="relative aspect-[9/10] rounded-2xl overflow-hidden bg-gray-800 shadow-xl mb-4">
                            <img src="${img.url}" class="object-cover object-top w-full h-full transition-transform duration-500 group-hover:scale-105">
                            ${img.isBinned ? '<div class="absolute inset-0 binned-overlay z-10 flex items-center justify-center"><span class="text-gray-500 text-xs font-medium uppercase tracking-widest">Excluded</span></div>' : ''}
                        </div>
                        <div class="px-1 mb-4 flex-grow">
                            <h3 class="text-xl font-bold text-white mb-1">${img.name}</h3>
                            <p class="text-sm text-gray-400 leading-relaxed">${img.desc}</p>
                        </div>
                        <div class="flex justify-center gap-6 mt-auto pb-2">
                            <button onclick="toggleFavorite(${img.id})" class="p-3 bg-gray-800 border border-gray-700 rounded-full hover:border-yellow-400/50">
                                <i data-lucide="star" class="text-yellow-400 w-6 h-6"></i>
                            </button>
                            <button onclick="toggleBin(${img.id})" class="p-3 rounded-full border ${img.isBinned ? 'bg-red-950/20 border-red-500 text-red-500' : 'bg-gray-800 border-gray-700 text-gray-500'}">
                                <i data-lucide="trash-2" class="w-6 h-6"></i>
                            </button>
                        </div>
                    `;
                    mainGrid.appendChild(card);
                }
            });
            lucide.createIcons();
        }

        window.toggleFavorite = (id) => {
            state[id].isFavorite = !state[id].isFavorite;
            state[id].isBinned = false;
            render();
        };

        window.toggleBin = (id) => {
            state[id].isBinned = !state[id].isBinned;
            render();
        };

        render();
    </script>
</body>
</html>
