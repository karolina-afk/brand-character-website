<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Character Exploration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-black: #000000;
            --card-bg: #111827; /* gray-900 */
            --btn-bg: #1f2937;  /* gray-800 */
            --text-white: #ffffff;
            --text-gray: #9ca3af;
            --yellow: #facc15;
            --red: #7f1d1d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            text-align: center;
            margin-bottom: 3.5rem;
            letter-spacing: -0.05em;
        }

        /* Favourites Section */
        .favourites-section {
            background-color: var(--card-bg);
            border: 2px solid var(--yellow);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 4rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            min-height: 150px;
        }

        .favourites-section h2 {
            color: var(--yellow);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        #favorites-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .empty-msg {
            color: var(--text-gray);
            font-style: italic;
        }

        .fav-card {
            width: 140px;
            text-align: center;
            animation: fadeIn 0.3s ease-out;
        }

        .fav-img-container {
            position: relative;
            aspect-ratio: 9/10;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .fav-img-container:hover {
            transform: scale(1.05);
        }

        .fav-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }

        .remove-fav {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            padding: 4px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fav-name {
            margin-top: 0.75rem;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 3rem;
        }

        .character-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        .placeholder {
            aspect-ratio: 9/10;
            border: 1px dashed #374151;
            background: rgba(17, 24, 39, 0.2);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f2937;
        }

        .img-wrapper {
            position: relative;
            aspect-ratio: 9/10;
            border-radius: 1.25rem;
            overflow: hidden;
            background: #1f2937;
            margin-bottom: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: transform 0.5s ease;
        }

        .character-card:hover .img-wrapper img {
            transform: scale(1.05);
        }

        .binned-overlay {
            position: absolute;
            inset: 0;
            background: rgba(3, 7, 18, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        .binned-overlay span {
            color: #6b7280;
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .character-info h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .character-info p {
            color: var(--text-gray);
            font-size: 0.875rem;
            min-height: 3rem;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
            padding-bottom: 0.5rem;
        }

        .btn {
            background: var(--btn-bg);
            border: 1px solid #374151;
            border-radius: 50%;
            padding: 0.75rem;
            cursor: pointer;
            color: var(--text-gray);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .btn-star:hover {
            border-color: rgba(250, 204, 21, 0.5);
            background: rgba(250, 204, 21, 0.1);
        }

        .btn-star i { color: var(--yellow); }

        .is-binned .binned-overlay { display: flex; }
        .is-binned .btn-bin { 
            background: rgba(127, 29, 29, 0.2); 
            border-color: rgba(239, 68, 68, 0.5); 
            color: #ef4444; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .main-grid { grid-template-columns: 1fr; }
            .fav-card { width: 100px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Pick your brand character</h1>

    <section class="favourites-section">
        <h2>Favourites</h2>
        <div id="favorites-grid">
            <p class="empty-msg">No favorites selected yet. Click the star on an image to move it here.</p>
        </div>
    </section>

    <main class="main-grid" id="main-grid">
        </main>
</div>

<script>
    const githubUrls = [
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_22b24s22b24s22b2.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_48mfr48mfr48mfr4.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_7rm1my7rm1my7rm1.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_8t9fyd8t9fyd8t9f.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_bg3kosbg3kosbg3k.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_fez2jfez2jfez2jf.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_ffaz02ffaz02ffaz.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets/main/Gemini_Generated_Image_skzqspskzqspskzq.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v2/main/Gemini_Generated_Image_775nlq775nlq775n.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v2/main/Gemini_Generated_Image_d7j2i7d7j2i7d7j2.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v2/main/Gemini_Generated_Image_g93lajg93lajg93l.png",
        "https://raw.githubusercontent.com/karolina-afk/branding-workshop-assets-v2/main/Gemini_Generated_Image_t6lzzut6lzzut6lz.png"
    ];

    const archetypes = [
        { name: "The Hero", desc: "Courageous, disciplined, and strong. They want to prove their worth through difficult actions." },
        { name: "The Creator", desc: "Imaginative, non-conforming, and inventive. They are driven to build something of lasting value." },
        { name: "The Caregiver", desc: "Compassionate, generous, and nurturing. Their goal is to protect and help others." },
        { name: "The Magician", desc: "Visionary, charismatic, and transformative. They make the impossible happen." },
        { name: "The Lover", desc: "Sensual, empathetic, and aesthetic. They focus on building relationships and creating beauty." },
        { name: "The Outlaw", desc: "Disruptive, wild, and liberating. They want to break the rules and overturn the status quo." },
        { name: "The Ruler", desc: "Authoritative, organized, and stable. They provide a sense of security and excellence." },
        { name: "The Jester", desc: "Playful, irreverent, and funny. They live in the moment and use humor to break barriers." },
        { name: "The Everyman", desc: "Relatable, friendly, and down-to-earth. They value hard work and common sense." },
        { name: "The Innocent", desc: "Optimistic, honest, and humble. They focus on simplicity and happiness." },
        { name: "The Explorer", desc: "Independent, adventurous, and brave. They crave freedom and self-discovery." },
        { name: "The Sage", desc: "Philosophical, wise, and analytical. They value truth and knowledge above all else." }
    ];

    // State management
    let state = githubUrls.map((url, i) => ({
        id: i,
        url: url,
        name: archetypes[i].name,
        desc: archetypes[i].desc,
        isFavorite: false,
        isBinned: false
    }));

    function render() {
        const mainGrid = document.getElementById('main-grid');
        const favGrid = document.getElementById('favorites-grid');
        
        // Render Favorites
        const favs = state.filter(img => img.isFavorite);
        if (favs.length === 0) {
            favGrid.innerHTML = '<p class="empty-msg">No favorites selected yet. Click the star on an image to move it here.</p>';
        } else {
            favGrid.innerHTML = favs.map(img => `
                <div class="fav-card">
                    <div class="fav-img-container">
                        <img src="${img.url}" alt="${img.name}">
                        <button class="remove-fav" onclick="toggleFavorite(${img.id})">
                            <i data-lucide="x" style="width:16px; height:16px;"></i>
                        </button>
                    </div>
                    <div class="fav-name">${img.name}</div>
                </div>
            `).join('');
        }

        // Render Main Grid
        mainGrid.innerHTML = state.map(img => {
            if (img.isFavorite) {
                return `<div class="placeholder"><i data-lucide="star" style="width:32px; height:32px;"></i></div>`;
            }
            return `
                <div class="character-card ${img.isBinned ? 'is-binned' : ''}">
                    <div class="img-wrapper">
                        <img src="${img.url}" alt="${img.name}">
                        <div class="binned-overlay"><span>Excluded</span></div>
                    </div>
                    <div class="character-info">
                        <h3>${img.name}</h3>
                        <p>${img.desc}</p>
                    </div>
                    <div class="actions">
                        <button class="btn btn-star" onclick="toggleFavorite(${img.id})" title="Move to Favourites">
                            <i data-lucide="star"></i>
                        </button>
                        <button class="btn btn-bin" onclick="toggleBin(${img.id})" title="${img.isBinned ? 'Restore' : 'Exclude'}">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                </div>
            `;
        }).join('');

        // Refresh icons
        lucide.createIcons();
    }

    window.toggleFavorite = (id) => {
        state = state.map(img => img.id === id ? { ...img, isFavorite: !img.isFavorite, isBinned: false } : img);
        render();
    };

    window.toggleBin = (id) => {
        state = state.map(img => img.id === id ? { ...img, isBinned: !img.isBinned } : img);
        render();
    };

    // Initial render
    render();
</script>

</body>
</html>
